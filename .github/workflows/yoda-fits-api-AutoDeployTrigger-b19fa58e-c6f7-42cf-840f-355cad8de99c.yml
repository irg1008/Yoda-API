name: Trigger auto deployment for yoda-fits-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/yoda-fits-api-AutoDeployTrigger-b19fa58e-c6f7-42cf-840f-355cad8de99c.yml'

  # Allow mannually trigger 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to container registry
        uses: docker/login-action@v1
        with:
          registry: yodacr.azurecr.io
          username: ${{ secrets.YODAFITSAPI_REGISTRY_USERNAME }}
          password: ${{ secrets.YODAFITSAPI_REGISTRY_PASSWORD }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: yodacr.azurecr.io/yoda-fits-api:${{ github.sha }}
          file: ./Dockerfile
          context: ./


  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.YODAFITSAPI_AZURE_CREDENTIALS }}


      - name: Deploy to containerapp
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            az containerapp registry set -n yoda-fits-api -g DefaultResourceGroup-CUS --server yodacr.azurecr.io --username  ${{ secrets.YODAFITSAPI_REGISTRY_USERNAME }} --password ${{ secrets.YODAFITSAPI_REGISTRY_PASSWORD }}
            az containerapp update -n yoda-fits-api -g DefaultResourceGroup-CUS --image yodacr.azurecr.io/yoda-fits-api:${{ github.sha }}
